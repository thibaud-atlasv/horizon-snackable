tasks:
  - name: "Arena Vermin - Full Game"
    status: in_progress
    reference: "Vampire Survivors / Survivor.io"
    subtasks:
      - name: "Milestone 1: Core Movement + Arena"
        status: done
        summary: "Isometric tiled arena, chibi knight with idle/walk bob, floating joystick, camera follow, arena wrap, title screen"
        files: [GameComponent.ts, Renderer.ts, Input.ts, Constants.ts, Assets.ts, GameViewModel.ts, game.xaml]
      - name: "Fix: Tile size + movement speed bug"
        status: done
        summary: "Tiles changed to 64x64, movement speed normalized in screen space so all directions feel equal"
        files: [Constants.ts, GameComponent.ts]
      - name: "Milestone 2: Combat Loop"
        status: done
        summary: "Auto-attack with range ring, grunt rat enemies with 3-state AI, damage numbers, hit feedback (pause, sparks, flash, recoil), attack swing animation, enemy death animation, spawn drop-in, contact damage with camera shake"
        files: [CombatSystem.ts, EnemySystem.ts, AnimationSystem.ts, ParticleSystem.ts, FloatingText.ts, ArenaVerminComponent.ts, Constants.ts, Types.ts, IsoRenderer.ts, Assets.ts]
      - name: "Fix: Combat visual polish (4 issues)"
        status: done
        summary: "Hurt/death now code-driven (bones sprite for death), flash effects sprite-masked, range ring transparent+glow, slash VFX on attack"
        files: [AnimationSystem.ts, IsoRenderer.ts, CombatSystem.ts, ParticleSystem.ts, Assets.ts]
      - name: "Fix: Flash effect - XAML opacity mask approach"
        status: done
        summary: "Replaced pushClip ellipse flashes with XAML Rectangle overlays using OpacityMask bound to sprite textures for pixel-perfect silhouette flashes"
        files: [ArenaVerminViewModel.ts, game.xaml, ArenaVerminComponent.ts]
      - name: "Refactor: XAML sprite rendering for all characters"
        status: done
        summary: "Migrated hero (body+weapon) and enemies (15-slot pool) from DrawingSurface to XAML Rectangles with ImageBrush fill, OpacityMask flash overlays, and full transform bindings"
        files: [SpriteUpdater.ts, ArenaVerminViewModel.ts, game.xaml, ArenaVerminComponent.ts]
      - name: "Milestone 3: Wave System + HUD"
        status: done
        summary: "20-wave system with timed waves, burst spawning, HP scaling, pickups (XP gems + coins), full XAML HUD (LevelBar, TimerBoard, WaveBar, EnemyCount, CoinCount, Pause), pause menu, XP/leveling"
        files: [WaveSystem.ts, PickupSystem.ts, ArenaVerminViewModel.ts, game.xaml, ArenaVerminComponent.ts, Constants.ts]
      - name: "Add: Health system + Death + Game Over"
        status: done
        summary: "Already implemented in Milestone 3. HP bar, death animation, death screen with RETRY/RETURN, full state reset. Minor fix: HP text now shows current/max format."
        files: [ArenaVerminViewModel.ts]
      - name: "Milestone 4: All Enemies + Elites"
        status: done
        summary: "4 new enemy types (Gunner Mouse, Drone Rat, Sewer Bruiser, Gas Rat) with unique AI/attacks. Projectile + gas cloud systems. Elite variants with 2.5x HP, 1.3x speed, 1.5x damage, pulsing glow, 1.3x scale. Wave-based enemy mixing and elite spawn chance."
        files: [EnemySystem.ts, ProjectileSystem.ts, GasCloudSystem.ts, SpriteUpdater.ts, WaveSystem.ts, CombatSystem.ts, ArenaVerminComponent.ts, ArenaVerminViewModel.ts, game.xaml, Types.ts, Constants.ts, Assets.ts]
      - name: "Visual Polish Batch: Camera clamp, character scale, range ring removal, crit z-order"
        status: done
        summary: "Camera clamped to map bounds, all sprites ×1.5, range ring removed, crit sprite renders above XAML characters via dedicated overlay DrawingSurface"
        files: [ArenaVerminComponent.ts, Constants.ts, IsoRenderer.ts, ParticleSystem.ts, ArenaVerminViewModel.ts, game.xaml]
      - name: "Fix: Character moves slowly/weirdly near map edges"
        status: done
        summary: "Added wall-sliding with speed preservation — when one axis is clamped at boundary, the free axis velocity scales up by √2 to maintain constant speed"
        files: [ArenaVerminComponent.ts]
      - name: "Remove isometric projection — switch to flat 2D top-down"
        status: done
        summary: "Replaced dimetric projection with flat 2D (1 unit = 64px). Camera clamp is now rectangular/axis-aligned. Movement is direct screen-space. Gas clouds are circles. All systems use the simplified worldToScreen()."
        files: [IsoRenderer.ts, ArenaVerminComponent.ts, Constants.ts, GasCloudSystem.ts]
      - name: "Enemy Weapons + Vacuum Loot"
        status: done
        summary: "Generated weapon sprites for Drone Rat, Sewer Bruiser, Gas Rat. Hooked up in SpriteUpdater."
        files: [Assets.ts, Constants.ts, SpriteUpdater.ts]
        subtasks:
          - name: "Add weapon sprites to special enemies (Drone, Bruiser, Gas Rat)"
            status: done
          - name: "Satisfying vacuum/magnet effect on loot pickups"
            status: done
            summary: "Pickups within 3-unit radius accelerate toward hero (8 u/s²), shrink as they approach, collect with existing particle burst. Frame-rate independent."
            files: [PickupSystem.ts, ArenaVerminComponent.ts, Constants.ts, Types.ts]
      - name: "Fix: Editor crash from DroneWeapon refactor mismatch"
        status: done
        summary: "DroneWeapon.ts was refactored to projectile-based but ArenaVerminComponent.ts was not updated. Fixed call signature, added drone projectile imports/field/rendering/cleanup."
        files: [ArenaVerminComponent.ts, DroneWeapon.ts]
      - name: "Milestone 5: Upgrade System + Hero Weapons"
        status: in_progress
        reference: "Vampire Survivors"
        subtasks:
          - name: "Upgrade selection UI + system"
            status: done
            summary: "Level-up triggers pause + 3 random weapon cards. Tap to unlock/upgrade. Chained level-ups supported."
            files: [UpgradeSystem.ts, ArenaVerminViewModel.ts, game.xaml, ArenaVerminComponent.ts]
          - name: "Drone weapon (Weapon01 orbiting)"
            status: done
            summary: "Orbiting drones fire projectiles at enemies. 5 upgrade levels (1→2→3 drones, scaling speed/damage/range)."
            files: [DroneWeapon.ts, ArenaVerminComponent.ts]
          - name: "Arm Minigun weapon (Weapon02 auto-fire)"
            status: done
            summary: "Rapid-fire bullets toward nearest enemy. 5 levels: more fire rate, damage, multi-bullet spread at lvl 3+. Yellow/orange projectiles."
            files: [MinigunWeapon.ts, ArenaVerminComponent.ts, Types.ts, Constants.ts]
          - name: "Damage Circle weapon (Weapon03 AoE)"
            status: done
            summary: "Periodic AoE pulse around hero with expanding ring VFX. 5 levels: bigger radius (2→4 units), more damage (8→20), faster pulses (2s→1s)."
            files: [DamageCircleWeapon.ts, ArenaVerminComponent.ts, Types.ts, Constants.ts]
          - name: "Balancing pass"
            status: not_started
      - name: "Gameplay batch: heal drops, bosses, remove drone, more XP, wave-end vacuum"
        status: done
        summary: "Removed starting drone, 6x XP gains, health heart drops (12%), wave-end auto-vacuum, Rat King Boss every 5 waves with charge/summon AI and boss HP bar."
        subtasks:
          - name: "Remove initial drone + increase XP gains"
            status: done
            summary: "Confirmed drone not pre-equipped. Doubled gem drop counts + tripled XP per gem (~6x faster leveling)."
            files: [Constants.ts, PickupSystem.ts]
          - name: "Health pickup drops from enemies"
            status: done
            summary: "New HealthHeart pickup type. 12% drop chance, restores 15 HP, heart sprite with pulse animation, green floating text."
            files: [Types.ts, Constants.ts, PickupSystem.ts, Assets.ts, ArenaVerminComponent.ts]
          - name: "Auto-vacuum loot at wave end"
            status: done
            summary: "On waveEnded event, all pickups get magnetActive=true with boosted speed and extended lifetime."
            files: [ArenaVerminComponent.ts, PickupSystem.ts]
          - name: "Boss enemies"
            status: done
            summary: "Rat King Boss with custom sprite, 3-phase AI (chase/charge/summon), spawns every 5 waves, boss HP bar, warning text, massive loot explosion."
            files: [EnemySystem.ts, WaveSystem.ts, SpriteUpdater.ts, ArenaVerminComponent.ts, ArenaVerminViewModel.ts, game.xaml, Types.ts, Constants.ts, Assets.ts]
        subtasks:
          - name: "Remove initial drone + increase XP gains"
            status: done
            summary: "Confirmed drone not pre-equipped. Doubled gem drop counts for all enemy types + tripled XP per gem (~6x faster leveling)."
            files: [Constants.ts, PickupSystem.ts]
          - name: "Health pickup drops from enemies"
            status: done
            summary: "New HealthHeart pickup type. 12% drop chance, restores 15 HP, heart sprite with pulse animation, green floating text."
            files: [Types.ts, Constants.ts, PickupSystem.ts, Assets.ts, ArenaVerminComponent.ts]
          - name: "Auto-vacuum loot at wave end"
            status: done
            summary: "On waveEnded event, all pickups get magnetActive=true with boosted speed and extended lifetime."
            files: [ArenaVerminComponent.ts, PickupSystem.ts]
          - name: "Boss enemies"
            status: done
            summary: "Rat King Boss spawns every 5 waves. 500+ HP, charge/summon AI phases, boss HP bar, warning text, massive loot drop on death. Custom sprite generated."
            files: [EnemySystem.ts, WaveSystem.ts, SpriteUpdater.ts, CombatSystem.ts, ArenaVerminComponent.ts, ArenaVerminViewModel.ts, game.xaml, Types.ts, Constants.ts, Assets.ts]
      - name: "Gameplay batch: heal drops, bosses, remove drone, more XP, wave-end vacuum"
        status: done
        summary: "Removed starting drone, 6x XP gains, health heart drops (12%), wave-end auto-vacuum, Rat King Boss every 5 waves."
      - name: "HUD Redesign - Full rework"
        status: done
        summary: "Complete HUD rebuild with clear hierarchy: top panel (HP bar, XP bar, coins/kills), bottom wave panel (wave number + timer), center overlays unchanged. Semi-transparent dark panels, mobile-readable sizes, accent colors."
        files: [game.xaml, ArenaVerminComponent.ts, ArenaVerminViewModel.ts]
      - name: "Milestone 6: Bosses + Meta"
        status: not_started
      - name: "Milestone 7: Polish"
        status: not_started

