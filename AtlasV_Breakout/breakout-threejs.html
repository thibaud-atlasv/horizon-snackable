<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Breakout — Three.js Port</title>
<style>
  /* ── Global layout ─────────────────────────────────────────────────── */
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Roboto', 'Segoe UI', Tahoma, sans-serif;
    color: #fff;
    height: 100%;
    width: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* ── Stage — fixed 9:16 portrait, fits viewport height ─────────────── */
  #stage {
    position: relative;
    aspect-ratio: 9 / 16;
    height: 100vh;
    max-width: 100vw;
    max-height: calc(100vw * 16 / 9);
    overflow: hidden;
    background: linear-gradient(to bottom,
      #0A0612 0%,
      #0D0A1A 20%,
      #100D22 40%,
      #0E0B1E 60%,
      #0A0816 80%,
      #060410 100%);
    display: flex;
    flex-direction: column;
  }
  /* Play area — gameplay canvas + bricks/ball/paddle + overlays.
     The cyan border lives here so it surrounds only the playable zone. */
  #playArea {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    box-shadow: inset 0 0 0 1px rgba(0, 255, 232, 0.35);
  }
  /* HUD area — score bar below play area with small breathing room above */
  #hudArea {
    position: relative;
    flex: 0 0 auto;
    padding: 10px 4px 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #bgOverlay {
    position: absolute;
    inset: 0;
    opacity: 0;
    mix-blend-mode: screen;
    -webkit-mask-image: linear-gradient(to bottom, #fff 0%, #fff 40%, transparent 100%);
            mask-image: linear-gradient(to bottom, #fff 0%, #fff 40%, transparent 100%);
    pointer-events: none;
    z-index: 1;
  }
  #game {
    position: absolute;
    inset: 0;
    touch-action: none;
    user-select: none;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: block;
  }
  #level {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    opacity: 0.45;
    letter-spacing: 3px;
    pointer-events: none;
    z-index: 10;
  }
  /* ── Score bar — lives in #hudArea (flex child), rainbow neon frame ── */
  #scoreBar {
    position: relative;
    width: 100%;
    pointer-events: none;
    opacity: 0;
    transform-origin: 50% 50%;
    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 3px;
    padding: 4px 20px;
    margin-top: 20px;
    box-sizing: border-box;
    background:
      linear-gradient(135deg, #E6000000 0%, #CC1A0A2E 30%, #CC2D0A4E 70%, #E6000000 100%);
    border: 1.5px solid transparent;
    background-clip: padding-box;
  }
  #scoreBar::before {
    content: '';
    position: absolute;
    inset: -1.5px;
    border-radius: 3px;
    padding: 1.5px;
    background: linear-gradient(90deg,
      #D0246A 0%,
      #B0208A 50%,
      #6A1F8F 100%);
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  /* Score number — stack of 5 layered text blocks */
  .scoreStack {
    position: relative;
    line-height: 0.9;
    display: inline-block;
    transform-origin: 50% 50%;
  }
  .scoreLayer {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-family: 'Roboto', sans-serif;
    text-align: center;
    white-space: nowrap;
    pointer-events: none;
  }
  .scoreMain {
    position: relative;
    font-weight: 900;
    font-family: 'Roboto', sans-serif;
    font-size: 36px;
    text-align: center;
    letter-spacing: 2px;
    background: linear-gradient(to bottom,
      #FFFFFF 0%,
      #FFD700 40%,
      #FFAA00 70%,
      #FFD700 100%);
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
            color: transparent;
  }
  .scoreShadow  { color: #40000000; font-size: 38px; transform: translate(2px, 2px); }
  .scoreMagenta { color: #60FF00FF; font-size: 37px; }
  .scorePink    { color: #80FF1493; font-size: 37px; }
  .scoreCyan    { color: #9000FFFF; font-size: 36px; }

  /* ── Center text (TAP TO START / GAME OVER / CLEARED) ─────────────── */
  /*
   * XAML structure (from GameHUD.xaml):
   *   - Outer Border: Margin=-12, Padding=8, radial magenta glow background
   *   - Main Border: Padding=50,30, dark gradient fill, rainbow linear border 4px
   *   - 5 stacked TextBlocks with different sizes/colors for layered glow
   */
  #centerContainer {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 11;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    transform-origin: 50% 50%;
    /* Outer glow "Border" from XAML — subtle magenta aura hugging the frame. */
    padding: 8px;
    background: radial-gradient(ellipse at center,
      rgba(255, 0, 255, 0.22) 0%,
      rgba(255, 20, 147, 0.1) 50%,
      rgba(0, 0, 0, 0) 100%);
    border-radius: 8px;
  }
  #centerWrap {
    position: relative;
    padding: 10px 22px;
    border-radius: 3px;
    background: linear-gradient(135deg, #E6000000 0%, #CC1A0A2E 30%, #CC2D0A4E 70%, #E6000000 100%);
    border: 2px solid transparent;
    background-clip: padding-box;
    transform-origin: 50% 50%;
  }
  #centerWrap::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 3px;
    padding: 2px;
    background: linear-gradient(135deg,
      #FF1493 0%,
      #FFD700 25%,
      #00FFFF 50%,
      #FF00FF 75%,
      #FF1493 100%);
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }
  .centerStack {
    position: relative;
    font-family: 'Roboto', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 2px;
    line-height: 1;
    text-align: center;
    white-space: nowrap;
  }
  /* Hide the old-approach layered siblings — we now use text-shadow stacks
     on a single .centerMain element instead. */
  .centerLayer { display: none; }
  .centerMain {
    position: relative;
    background: linear-gradient(to bottom,
      #FFFFFF 0%,
      #FFD700 40%,
      #FFAA00 70%,
      #FFD700 100%);
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
            color: transparent;
    /* Discreet glow — only a faint magenta shadow, no inner cyan. */
    filter: drop-shadow(0 0 4px rgba(255, 20, 147, 0.45));
  }

  /* ── Combo HUD — full-stage overlay with pop/grow/fade ────────────── */
  #comboOverlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 9;
    opacity: 0;
    will-change: transform, opacity;
  }
  #comboWrap {
    text-align: center;
    transform-origin: 50% 50%;
    will-change: transform;
  }
  #comboLabel {
    font-weight: 900;
    font-size: 32px;
    letter-spacing: 6px;
    opacity: 0.7;
    color: #00FFFF;
    text-shadow: 0 0 14px currentColor;
  }
  #comboNumberWrap {
    position: relative;
    line-height: 0.85;
  }
  .comboNumber {
    font-weight: 900;
    font-size: 160px;
    letter-spacing: -4px;
    background: linear-gradient(to bottom, #66FFFF 0%, #00CCCC 100%);
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
            color: transparent;
  }
  #comboGlow {
    position: absolute;
    inset: 0;
    font-size: 170px;
    opacity: 0.4;
    filter: blur(14px);
    display: none;
  }
  #comboGlow.show { display: block; }

// ============================================================================
// Simple Event Bus
// ============================================================================
const Events = (() => {
  const subs = new Map();
  return {
    on(name, fn) {
      if (!subs.has(name)) subs.set(name, new Set());
      subs.get(name).add(fn);
      return () => subs.get(name)?.delete(fn);
    },
    emit(name, payload) { subs.get(name)?.forEach(fn => fn(payload ?? {})); },
  };
})();

// ============================================================================
// Collision Manager — ported from Scripts/CollisionManager.ts
// ============================================================================
const CollisionManager = (() => {
  const colliders = new Set();
  return {
    register(c) { colliders.add(c); },
    unregister(c) { colliders.delete(c); },
    checkAgainst(mover) {
      const a = mover.getColliderBounds();
      for (const other of colliders) {
        if (other === mover) continue;
        const b = other.getColliderBounds();
        if (a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y) {
          mover.onCollision(other);
          other.onCollision(mover);
        }
      }
    },
  };
})();

const camera = new THREE.OrthographicCamera(-WIDTH / 2, WIDTH / 2, HEIGHT / 2, -HEIGHT / 2, 0.1, 100);
camera.position.set(0, 0, 10);
camera.lookAt(0, 0, 0);

const cameraShake = { intensity: 0, duration: 0, elapsed: 0 };
function triggerShake(intensity, duration) {
  if (intensity > cameraShake.intensity) {
    cameraShake.intensity = intensity;
    cameraShake.duration = duration;
    cameraShake.elapsed = 0;
  }
}

const freeze = { until: 0 };
function triggerFreeze(duration) {
  const end = performance.now() / 1000 + duration;
  if (end > freeze.until) freeze.until = end;
}

function resize() {
  const rect = playArea.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;
  renderer.setSize(w, h, false);
  // Keep world-space 9:16 play area visible inside playArea (which is slightly
  // shorter than 9:16 because the HUD takes a bottom slice). Fit-by-contain:
  // if playArea is wider-than-tall relative to 9:16, pad left/right.
  const targetAspect = WIDTH / HEIGHT;
  const actualAspect = w / h;
  let viewW, viewH;
  if (actualAspect > targetAspect) {
    viewH = HEIGHT;
    viewW = HEIGHT * actualAspect;
  } else {
    viewW = WIDTH;
    viewH = WIDTH / actualAspect;
  }
  camera.left = -viewW / 2;
  camera.right = viewW / 2;
  camera.top = viewH / 2;
  camera.bottom = -viewH / 2;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
// Use ResizeObserver to catch initial layout after flexbox computes sizes
const ro = new ResizeObserver(resize);
ro.observe(playArea);
resize();

// Shared geometries
const QUAD_GEOM = new THREE.PlaneGeometry(1, 1);
const CIRCLE_GEOM = new THREE.CircleGeometry(0.5, 32);

function mkQuad(color) {
  const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color(color[0], color[1], color[2]) });
  return new THREE.Mesh(QUAD_GEOM, mat);
}
function mkCircle(color, alpha = 1) {
  const mat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(color[0], color[1], color[2]),
    transparent: true,
    opacity: alpha,
  });
  return new THREE.Mesh(CIRCLE_GEOM, mat);
}

// ============================================================================
// Brick — ported from Scripts/Components/Brick.ts
// ============================================================================
class Brick {
  constructor() {
    this.mesh = mkQuad([1, 1, 1]);
    this.mesh.visible = false;
    scene.add(this.mesh);
    this.colliderTag = 'brick';
    this.active = false;
    this.indestructible = false;
    this.hits = 1;
    this.hitsRemaining = 1;
    this.baseColor = new THREE.Color(1, 1, 1);
    this.targetScale = new THREE.Vector3(1, 1, 1);
    this.targetPos = new THREE.Vector3();
    this.revealing = false;
    this.revealAge = 0;
    this.revealDelay = 0;
    this.revealStyle = REVEAL_STYLE.POP;
    this.dying = false;
    this.deathAge = 0;
    this.deathScale = new THREE.Vector3(1, 1, 1);
    this.flashUntil = 0;
    this.titleAnim = false;
    this.idleAge = 0;
    this.idlePhaseOffset = 0;
    this._registered = false;
  }

  init(x, y, w, h, colorPalette, delay, style, titleAnim) {
    this.hits = 1;
    this.hitsRemaining = 1;
    this.brickColors = colorPalette;
    const [r, g, b] = colorPalette?.[1] ?? [1, 1, 1];
    this.baseColor = new THREE.Color(r, g, b);
    this.mesh.material.color.copy(this.baseColor);
    this.targetScale.set(w, h, 1);
    this.targetPos.set(x, y, 0);
    this.mesh.position.copy(this.targetPos);
    this.revealStyle = style;
    this.revealDelay = delay;
    this.revealAge = 0;
    this.revealing = true;
    this.active = true;
    this.mesh.visible = true;
    this.dying = false;
    this.titleAnim = !!titleAnim;
    this.idleAge = 0;
    this.idlePhaseOffset = y * 1.8;

    if (style === REVEAL_STYLE.DROP) {
      this.mesh.position.y = this.targetPos.y + 3;
      this.mesh.scale.copy(this.targetScale);
    } else if (style === REVEAL_STYLE.STRETCH) {
      this.mesh.scale.set(this.targetScale.x, 0, 1);
    } else {
      this.mesh.scale.set(0, 0, 0);
    }
    this.mesh.rotation.z = 0;
  }

  getColliderBounds() {
    const p = this.mesh.position;
    const hw = this.mesh.scale.x * 0.5;
    const hh = this.mesh.scale.y * 0.5;
    return { x: p.x - hw, y: p.y - hh, w: hw * 2, h: hh * 2 };
  }

  onCollision(other) {
    if (other.colliderTag !== 'ball') return;
    if (this.indestructible) return;
    this.hitsRemaining--;
    if (this.hitsRemaining <= 0) this.triggerDestruction();
    else this.onHit();
  }

  onHit() {
    Events.emit('BrickHit', { position: this.mesh.position.clone(), color: this.baseColor.clone() });
    this.mesh.material.color.setRGB(1, 1, 1);
    this.flashUntil = performance.now() + 50;
  }

  triggerDestruction() {
    if (this._registered) {
      CollisionManager.unregister(this);
      this._registered = false;
    }
    Events.emit('BrickDestroyed', { position: this.mesh.position.clone(), color: this.baseColor.clone() });
    triggerShake(SHAKE_BRICK_DESTROY.intensity, SHAKE_BRICK_DESTROY.duration);
    triggerFreeze(FREEZE_BRICK_DESTROY);
    this.deathScale.copy(this.mesh.scale);
    this.deathAge = 0;
    this.dying = true;
    this.mesh.material.color.setRGB(1, 1, 1);
  }

  park() {
    if (this._registered) {
      CollisionManager.unregister(this);
      this._registered = false;
    }
    this.active = false;
    this.dying = false;
    this.revealing = false;
    this.titleAnim = false;
    this.mesh.visible = false;
    this.mesh.scale.set(0, 0, 0);
    this.mesh.rotation.z = 0;
  }

  _tickTitleIdle(dt) {
    if (!this.titleAnim || this.dying) return;
    this.idleAge += dt;
    const phase = this.idleAge * 3.0 + this.idlePhaseOffset;
    const scalePulse = 1.0 + 0.05 * Math.sin(phase);
    this.mesh.scale.set(
      this.targetScale.x * scalePulse,
      this.targetScale.y * scalePulse,
      this.targetScale.z * scalePulse,
    );
    const brightness = 0.5 + 0.5 * (0.5 + 0.2 * Math.sin(phase * 2.3));
    this.mesh.material.color.setRGB(
      this.baseColor.r * brightness,
      this.baseColor.g * brightness,
      this.baseColor.b * brightness,
    );
  }

  update(dt) {
    if (!this.active) return;

    if (this.flashUntil > 0 && performance.now() >= this.flashUntil) {
      this.mesh.material.color.copy(this.baseColor);
      this.flashUntil = 0;
    }

    if (this.dying) {
      this.deathAge += dt;
      const t = Math.min(this.deathAge / DEATH_DURATION, 1);
      const s = 1 - t * t;
      this.mesh.scale.set(this.deathScale.x * s, this.deathScale.y * s, this.deathScale.z * s);
      this.mesh.rotation.z = this.deathAge * DEATH_SPIN_SPEED;
      if (t >= 1) this.park();
      return;
    }

    if (this.revealing) {
      if (this.revealDelay > 0) { this.revealDelay -= dt; return; }
      this.revealAge += dt;
      const dur = this.revealStyle === REVEAL_STYLE.DROP ? REVEAL_DROP_DURATION : REVEAL_DURATION;
      const t = Math.min(this.revealAge / dur, 1);

      if (this.revealStyle === REVEAL_STYLE.POP) {
        const backOut = 1 + (REVEAL_OVERSHOOT - 1) * Math.sin(t * Math.PI);
        const s = t >= 1 ? 1 : t * t * backOut;
        this.mesh.scale.set(this.targetScale.x * s, this.targetScale.y * s, this.targetScale.z * s);
      } else if (this.revealStyle === REVEAL_STYLE.DROP) {
        let b;
        if (t < 0.36) b = 7.5625 * t * t;
        else if (t < 0.73) { const t2 = t - 0.545; b = 7.5625 * t2 * t2 + 0.75; }
        else { const t2 = t - 0.9; b = 7.5625 * t2 * t2 + 0.9375; }
        const offsetY = 3 * (1 - Math.min(b, 1));
        this.mesh.position.y = this.targetPos.y + offsetY;
      } else if (this.revealStyle === REVEAL_STYLE.SPIN) {
        const s = t * t * (3 - 2 * t);
        this.mesh.scale.set(this.targetScale.x * s, this.targetScale.y * s, this.targetScale.z * s);
        this.mesh.rotation.z = (1 - t) * Math.PI * 2;
      } else if (this.revealStyle === REVEAL_STYLE.STRETCH) {
        const half = 0.5;
        let sx, sy;
        if (t < half) { const p = t / half; sx = p * REVEAL_OVERSHOOT; sy = 0; }
        else {
          const p = (t - half) / half;
          sx = REVEAL_OVERSHOOT + (1 - REVEAL_OVERSHOOT) * p;
          const backOut = 1 + (REVEAL_OVERSHOOT - 1) * Math.sin(p * Math.PI);
          sy = p * p * backOut;
        }
        this.mesh.scale.set(
          this.targetScale.x * Math.min(sx, REVEAL_OVERSHOOT),
          this.targetScale.y * Math.min(sy, REVEAL_OVERSHOOT),
          1,
        );
      }

      if (t >= 1) {
        this.revealing = false;
        this.mesh.scale.copy(this.targetScale);
        this.mesh.rotation.z = 0;
        this.mesh.position.copy(this.targetPos);
        if (!this.titleAnim) {
          CollisionManager.register(this);
          this._registered = true;
        }
      }
      return;
    }

    this._tickTitleIdle(dt);
  }
}

// ============================================================================
// Level Layout
// ============================================================================
const brickPool = [];
const activeBricks = [];
const BRICK_POOL_SIZE = 340;
for (let i = 0; i < BRICK_POOL_SIZE; i++) brickPool.push(new Brick());

function randomRevealStyle() {
  const styles = [REVEAL_STYLE.POP, REVEAL_STYLE.DROP, REVEAL_STYLE.SPIN, REVEAL_STYLE.STRETCH];
  return styles[Math.floor(Math.random() * styles.length)];
}

function randomDelayPattern(rows, cols) {
  const pattern = Math.floor(Math.random() * 5);
  switch (pattern) {
    case 0: return (r, c) => r * 0.06 + c * 0.02;
    case 1: {
      const cr = (rows - 1) / 2, cc = (cols - 1) / 2;
      return (r, c) => Math.max(Math.abs(r - cr), Math.abs(c - cc)) * 0.07;
    }
    case 2: return r => r * 0.08;
    case 3: {
      const cache = new Map();
      const maxDelay = (rows + cols) * 0.03;
      return (r, c) => {
        const key = `${r},${c}`;
        if (!cache.has(key)) cache.set(key, Math.random() * maxDelay);
        return cache.get(key);
      };
    }
    case 4: default: return (_r, c) => c * 0.05;
  }
}

function layoutLevel(config) {
  for (const b of activeBricks) { b.park(); brickPool.push(b); }
  activeBricks.length = 0;

  const brickWidth = config.brickWidth ?? 1.2;
  const brickHeight = config.brickHeight ?? 0.4;
  const paddingX = config.paddingX ?? 0.1125;
  const paddingY = config.paddingY ?? 0.1125;
  const startY = config.startY ?? 4;

  const grid = config.grid.split('\n').map(row => [...row]);
  const cols = Math.max(...grid.map(row => row.length));
  const totalW = cols * brickWidth + (cols - 1) * paddingX;
  const originX = -totalW / 2 + brickWidth / 2;

  const revealStyle = randomRevealStyle();
  const delayFn = randomDelayPattern(grid.length, cols);

  let destructibleCount = 0;
  for (let r = 0; r < grid.length; r++) {
    const y = startY - r * (brickHeight + paddingY);
    for (let c = 0; c < grid[r].length; c++) {
      const char = grid[r][c];
      if (char === '0' || char === ' ') continue;
      const template = config.brickTemplates[char];
      if (!template) continue;
      const brick = brickPool.pop();
      if (!brick) continue;
      const x = originX + c * (brickWidth + paddingX);
      brick.init(x, y, brickWidth, brickHeight, template.colors, delayFn(r, c), revealStyle, config.isTitle);
      activeBricks.push(brick);
      if (!config.isTitle) destructibleCount++;
    }
  }
  return destructibleCount;
}

// ============================================================================
// VFX — circular particles + trail
// ============================================================================
class Particle {
  constructor() {
    this.mesh = mkCircle([1, 1, 1], 1);
    this.mesh.visible = false;
    scene.add(this.mesh);
    this.active = false;
    this.age = 0;
    this.life = 0;
    this.vx = 0; this.vy = 0; this.vz = 0;
    this.gravity = VFX_PARTICLE_GRAVITY;
    this.baseScale = 0.08;
    this.baseAlpha = 1;
    this.r = 1; this.g = 1; this.b = 1;
  }
  spawn(x, y, z, vx, vy, vz, r, g, b, a, life, scale, gravity) {
    this.mesh.position.set(x, y, z);
    this.mesh.scale.set(scale, scale, scale);
    this.mesh.material.color.setRGB(r, g, b);
    this.mesh.material.opacity = a;
    this.mesh.visible = true;
    this.r = r; this.g = g; this.b = b;
    this.vx = vx; this.vy = vy; this.vz = vz ?? 0;
    this.age = 0;
    this.life = life;
    this.baseScale = scale;
    this.baseAlpha = a;
    this.gravity = gravity ?? VFX_PARTICLE_GRAVITY;
    this.active = true;
  }
  update(dt) {
    if (!this.active) return;
    this.age += dt;
    this.vy -= this.gravity * dt;
    this.mesh.position.x += this.vx * dt;
    this.mesh.position.y += this.vy * dt;
    this.mesh.position.z += this.vz * dt;
    const frac = Math.max(0, 1 - this.age / this.life);
    const s = this.baseScale * frac;
    this.mesh.scale.set(s, s, s);
    this.mesh.material.opacity = this.baseAlpha * frac;
    if (this.age >= this.life) {
      this.active = false;
      this.mesh.visible = false;
    }
  }
}

const particlePool = [];
for (let i = 0; i < PARTICLE_POOL_SIZE; i++) particlePool.push(new Particle());
let particleIdx = 0;
function spawnParticle(x, y, z, vx, vy, vz, r, g, b, a, life, scale, gravity) {
  let p = particlePool[particleIdx];
  if (p.active) {
    for (let i = 0; i < particlePool.length; i++) {
      if (!particlePool[i].active) { p = particlePool[i]; particleIdx = i; break; }
    }
  }
  particleIdx = (particleIdx + 1) % particlePool.length;
  p.spawn(x, y, z, vx, vy, vz, r, g, b, a, life, scale, gravity);
}

const trailPool = [];
for (let i = 0; i < TRAIL_POOL_SIZE; i++) trailPool.push(new Particle());
let trailIdx = 0;
function spawnTrail(size, x, y, z, r, g, b) {
  const t = trailPool[trailIdx];
  trailIdx = (trailIdx + 1) % trailPool.length;
  t.spawn(x, y, z - 0.05, 0, 0, 0, r, g, b, VFX_TRAIL_ALPHA, VFX_TRAIL_LIFE, size, 0);
}

Events.on('BrickDestroyed', (p) => {
  for (let i = 0; i < VFX_IMPACT_COUNT; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 1.5;
    spawnParticle(
      p.position.x, p.position.y, 0.1,
      Math.cos(angle) * speed, Math.sin(angle) * speed, 0,
      p.color.r, p.color.g, p.color.b, 1,
      0.3 + Math.random() * 0.1, 0.15, VFX_PARTICLE_GRAVITY,
    );
  }
});

// ============================================================================
// Ball Power Service — ported from Services/BallPowerService.ts
// ============================================================================
const BallPower = {
  heat: 0,
  speedMultiplier: 1.0,
  pierceCount: 0,
  consumePierce() {
    this.heat = Math.max(0, this.heat - PIERCE_COMBO_COST);
    this._recalc();
  },
  incrementHeat() { this.heat++; this._recalc(); },
  resetHeat() { this.heat = 0; this._recalc(); },
  _recalc() {
    const h = this.heat;
    this.pierceCount = 0;
    for (const [threshold, pierce] of PIERCE_THRESHOLDS) {
      if (h >= threshold) { this.pierceCount = pierce; break; }
    }
    const baseSpeed = Math.min(
      POWER_MAX_SPEED_BASE,
      1 + POWER_SPEED_SCALE * Math.log(1 + h * POWER_SPEED_RATE),
    );
    this.speedMultiplier = baseSpeed + this.pierceCount * POWER_PIERCE_SPEED_BONUS;
  },
};

// ============================================================================
// Coins — ported from Services/CoinService.ts
// ============================================================================
const coins = [];
let superVacuum = false;
let coinComboCount = 0;
let paddleWorldX = 0;
let paddleWorldY = -7;

Events.on('BrickDestroyed', (p) => {
  const count = COIN_MIN + Math.floor(Math.random() * COINS_PER_BRICK);
  for (let i = 0; i < count; i++) {
    coins.push({
      x: p.position.x + (Math.random() - 0.5) * COIN_SCATTER,
      y: p.position.y - Math.random() * 0.3,
      vx: (Math.random() - 0.5) * 3,
      vy: COIN_INITIAL_VY - Math.random() * 1.5,
      age: 0,
    });
  }
});
Events.on('BallLost', () => { coins.length = 0; });
Events.on('ResetRound', () => { coins.length = 0; superVacuum = false; });
Events.on('PaddleHitCoin', () => { coinComboCount = 0; });
Events.on('IncrementCombo', () => { coinComboCount++; });

function updateCoins(dt) {
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.age += dt;
    if (!superVacuum && c.age >= COIN_MAX_LIFE) { coins.splice(i, 1); continue; }

    const dx = paddleWorldX - c.x;
    const dy = paddleWorldY - c.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < COLLECT_RADIUS) {
      const value = Math.floor(COIN_VALUE * (1 + coinComboCount * 0.5));
      Events.emit('CoinCollected', { value });
      for (let b = 0; b < COIN_BURST_COUNT; b++) {
        const ang = Math.random() * Math.PI * 2;
        const spd = 2 + Math.random() * 2;
        spawnParticle(c.x, c.y, COIN_Z, Math.cos(ang) * spd, Math.sin(ang) * spd, 0,
          COIN_COLOR[0], COIN_COLOR[1], COIN_COLOR[2], 1, 0.15, 0.08, 2);
      }
      coins.splice(i, 1);
      continue;
    }

    const inRange = superVacuum || dist < VACUUM_RADIUS;
    if (inRange && dist > 0.01) {
      const nx = dx / dist, ny = dy / dist;
      const radial = c.vx * nx + c.vy * ny;
      const tX = c.vx - radial * nx;
      const tY = c.vy - radial * ny;
      c.vx = radial * nx + tX * (1 - TANGENT_DAMPING);
      c.vy = radial * ny + tY * (1 - TANGENT_DAMPING);

      if (superVacuum) {
        c.vx += nx * SUPER_VACUUM_FORCE * dt;
        c.vy += ny * SUPER_VACUUM_FORCE * dt;
      } else {
        const t = 1 - dist / VACUUM_RADIUS;
        const pull = VACUUM_FORCE * (t * t + 0.3);
        c.vx += nx * pull * dt;
        c.vy += ny * pull * dt;
      }

      const maxSpd = superVacuum ? SUPER_VACUUM_MAX : VACUUM_MAX_SPEED;
      const sp = Math.sqrt(c.vx * c.vx + c.vy * c.vy);
      if (sp < VACUUM_MIN_SPEED) { c.vx = nx * VACUUM_MIN_SPEED; c.vy = ny * VACUUM_MIN_SPEED; }
      else if (sp > maxSpd) { c.vx = (c.vx / sp) * maxSpd; c.vy = (c.vy / sp) * maxSpd; }
    } else {
      c.vy -= COIN_GRAVITY * dt;
    }

    c.x += c.vx * dt;
    c.y += c.vy * dt;
    if (!superVacuum && c.y < BOUNDS.y - 1) { coins.splice(i, 1); continue; }

    const fadeIn = Math.min(c.age / 0.15, 1);
    spawnParticle(c.x, c.y, COIN_Z, 0, 0, 0, COIN_COLOR[0], COIN_COLOR[1], COIN_COLOR[2], 1,
      0.05, COIN_SCALE * fadeIn, 0);
  }
}

// ============================================================================
// Paddle — ported from Scripts/Components/Paddle.ts
// ============================================================================
const paddle = {
  mesh: mkQuad([1, 1, 1]),
  colliderTag: 'paddle',
  targetX: 0,
  resetPos: new THREE.Vector3(0, -7, 0),
  normalScale: new THREE.Vector3(2.2, 0.3, 1),
  lerpFactor: 0.88,
  squashTimer: 0,
  recoverTimer: 0,
  prevX: 0,
  smoothVelocity: 0,
  flashUntil: 0,
  baseColor: new THREE.Color(1, 1, 1),
  getColliderBounds() {
    const p = this.mesh.position;
    const hw = this.mesh.scale.x * 0.5;
    const hh = this.mesh.scale.y * 0.5;
    return { x: p.x - hw, y: p.y - hh, w: hw * 2, h: hh * 2 };
  },
  onCollision(other) {
    if (other.colliderTag !== 'ball') return;
    this.mesh.material.color.setRGB(1, 1, 1);
    this.flashUntil = performance.now() + 50;
    this.squashTimer = 0.08;
    this.recoverTimer = 0;
  },
  reset() {
    this.mesh.position.copy(this.resetPos);
    this.targetX = this.resetPos.x;
    this.mesh.scale.copy(this.normalScale);
  },
};
paddle.mesh.position.copy(paddle.resetPos);
paddle.mesh.scale.copy(paddle.normalScale);
scene.add(paddle.mesh);
CollisionManager.register(paddle);

function updatePaddle(dt) {
  if (paddle.flashUntil > 0 && performance.now() >= paddle.flashUntil) {
    paddle.mesh.material.color.copy(paddle.baseColor);
    paddle.flashUntil = 0;
  }
  const cur = paddle.mesh.position;
  const dx = paddle.targetX - cur.x;
  const newX = cur.x + dx * paddle.lerpFactor;
  const halfW = paddle.normalScale.x * 0.5;
  const clamped = Math.max(BOUNDS.x + halfW, Math.min(BOUNDS.x + BOUNDS.w - halfW, newX));
  paddle.mesh.position.x = clamped;

  const SQUASH_X = 1.3, SQUASH_Y = 0.7, SQUASH_DUR = 0.08, RECOVER_DUR = 0.15;
  let sx = paddle.normalScale.x, sy = paddle.normalScale.y;
  const rawV = (clamped - paddle.prevX) / Math.max(dt, 0.001);
  paddle.prevX = clamped;
  paddle.smoothVelocity += (rawV - paddle.smoothVelocity) * 0.15;
  const stretch = Math.min(Math.abs(paddle.smoothVelocity) * 0.08, 0.3);
  sx += stretch;
  sy -= stretch * 0.3;

  if (paddle.squashTimer > 0) {
    paddle.squashTimer -= dt;
    const t = 1 - paddle.squashTimer / SQUASH_DUR;
    sx = paddle.normalScale.x * (1 + (SQUASH_X - 1) * t);
    sy = paddle.normalScale.y * (1 + (SQUASH_Y - 1) * t);
    if (paddle.squashTimer <= 0) paddle.recoverTimer = RECOVER_DUR;
  } else if (paddle.recoverTimer > 0) {
    paddle.recoverTimer -= dt;
    const t = Math.max(paddle.recoverTimer / RECOVER_DUR, 0);
    sx = paddle.normalScale.x * (1 + (SQUASH_X - 1) * t) + stretch;
    sy = paddle.normalScale.y * (1 + (SQUASH_Y - 1) * t);
  }
  paddle.mesh.scale.set(sx, sy, 1);

  paddleWorldX = paddle.mesh.position.x;
  paddleWorldY = paddle.mesh.position.y;
}

// ============================================================================
// Ball — ported from Scripts/Components/Ball.ts (circular mesh)
// ============================================================================
const ball = {
  mesh: mkCircle([1, 1, 1], 1),
  colliderTag: 'ball',
  vx: 0, vy: 0,
  isIdle: true,
  locked: false,
  resetPos: new THREE.Vector3(0, -6.5, 0),
  speedBonus: 0,
  clearedLevels: 0,
  revealing: 0,
  baseSize: BALL_SIZE,
  trailTimer: 0,
  piercesLeft: 0,
  baseColor: new THREE.Color(1, 1, 1),
  gravity: 0,
  bounceRandomness: 0,
  getColliderBounds() {
    const p = this.mesh.position;
    const r = this.mesh.scale.x * 0.5;
    return { x: p.x - r, y: p.y - r, w: r * 2, h: r * 2 };
  },
  onCollision(other) {
    if (other.colliderTag === 'paddle' && this.vy < 0) {
      const pb = other.getColliderBounds();
      const pos = this.mesh.position;
      const r = this.mesh.scale.x * 0.5;
      this.mesh.position.y = pb.y + pb.h + r;
      triggerShake(SHAKE_PADDLE_HIT.intensity, SHAKE_PADDLE_HIT.duration);
      Events.emit('PaddleHit', { ballVelocityY: this.vy, ballVelocityX: this.vx });
      const paddleCx = pb.x + pb.w / 2;
      const hitFactor = (pos.x - paddleCx) / (pb.w / 2);
      const angle = hitFactor * (Math.PI / 3);
      const speed = this._effectiveSpeed();
      this.vx = speed * Math.sin(angle);
      this.vy = speed * Math.cos(angle);
      return;
    }
    if (other.colliderTag === 'brick') {
      if (this.piercesLeft > 0) {
        this.piercesLeft--;
        BallPower.consumePierce();
        return;
      }
      const bb = other.getColliderBounds();
      const pos = this.mesh.position;
      const r = this.mesh.scale.x * 0.5;
      const overlapX = Math.min(pos.x + r, bb.x + bb.w) - Math.max(pos.x - r, bb.x);
      const overlapY = Math.min(pos.y + r, bb.y + bb.h) - Math.max(pos.y - r, bb.y);
      const bcx = bb.x + bb.w * 0.5;
      const bcy = bb.y + bb.h * 0.5;
      let vx = this.vx, vy = this.vy;
      if (overlapX < overlapY) {
        if ((vx > 0 && pos.x < bcx) || (vx < 0 && pos.x > bcx)) vx = -vx;
      } else {
        if ((vy > 0 && pos.y < bcy) || (vy < 0 && pos.y > bcy)) vy = -vy;
      }
      [vx, vy] = this._withBounceRandomness(vx, vy);
      this.vx = vx; this.vy = vy;
    }
  },
  _withBounceRandomness(vx, vy) {
    if (this.bounceRandomness === 0) return [vx, vy];
    const sp = Math.sqrt(vx * vx + vy * vy);
    const ang = Math.atan2(vy, vx) + (Math.random() - 0.5) * this.bounceRandomness * Math.PI;
    return [sp * Math.cos(ang), sp * Math.sin(ang)];
  },
  _effectiveSpeed() {
    return BALL_SPEED_BASE * BallPower.speedMultiplier + this.speedBonus;
  },
  launch() {
    this.isIdle = false;
    const speed = this._effectiveSpeed();
    const angle = (Math.random() - 0.5) * (Math.PI / 3);
    this.vx = speed * Math.sin(angle);
    this.vy = speed * Math.cos(angle);
    Events.emit('ReleaseBall');
  },
  reset() {
    this.mesh.position.copy(this.resetPos);
    this.vx = 0; this.vy = 0;
    this.isIdle = true;
    this.locked = false;
    this.speedBonus = 0;
    this.mesh.scale.set(BALL_SIZE, BALL_SIZE, BALL_SIZE);
  },
};
ball.mesh.scale.set(BALL_SIZE, BALL_SIZE, BALL_SIZE);
ball.mesh.position.copy(ball.resetPos);
scene.add(ball.mesh);
CollisionManager.register(ball);

Events.on('BrickDestroyed', () => { ball.speedBonus += 0.05; });
Events.on('LevelCleared', () => {
  ball.vx = 0; ball.vy = 0;
  ball.isIdle = true;
  ball.locked = true;
  ball.mesh.position.set(0, -100, 0);
  ball.clearedLevels++;
});
Events.on('ResetRound', () => {
  ball.locked = true;
  setTimeout(() => ball.reset(), 200);
});

function updateBall(dt) {
  if (ball.revealing > 0) {
    const r = 1 - Math.max(ball.revealing, 0) / REVEAL_DURATION;
    const s = ball.baseSize * r;
    ball.mesh.scale.set(s, s, s);
    ball.revealing -= dt * 2;
    return;
  }
  if (ball.isIdle) {
    const pp = paddle.mesh.position;
    ball.mesh.position.set(pp.x, pp.y + paddle.normalScale.y / 2 + BALL_SIZE / 2, 0);
    return;
  }

  const r = ball.mesh.scale.x * 0.5;
  const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
  const steps = Math.min(8, Math.max(1, Math.ceil((speed * dt) / r)));
  const subDt = dt / steps;

  if (ball.trailTimer > VFX_TRAIL_INTERVAL) {
    const c = ball.mesh.material.color;
    spawnTrail(r * 2, ball.mesh.position.x, ball.mesh.position.y, 0, c.r, c.g, c.b);
    ball.trailTimer = 0;
  } else {
    ball.trailTimer += dt;
  }

  ball.piercesLeft = BallPower.pierceCount;

  for (let s = 0; s < steps; s++) {
    let vx = ball.vx;
    let vy = ball.vy - ball.gravity * subDt;
    const cur = ball.mesh.position;
    let nx = cur.x + vx * subDt;
    let ny = cur.y + vy * subDt;

    if (nx - r <= BOUNDS.x) { nx = BOUNDS.x + r; vx = Math.abs(vx); [vx, vy] = ball._withBounceRandomness(vx, vy); }
    else if (nx + r >= BOUNDS.x + BOUNDS.w) { nx = BOUNDS.x + BOUNDS.w - r; vx = -Math.abs(vx); [vx, vy] = ball._withBounceRandomness(vx, vy); }
    if (ny + r >= BOUNDS.y + BOUNDS.h) { ny = BOUNDS.y + BOUNDS.h - r; vy = -Math.abs(vy); [vx, vy] = ball._withBounceRandomness(vx, vy); }
    if (ny - r <= BOUNDS.y) { Events.emit('BallLost'); return; }

    ball.vx = vx; ball.vy = vy;
    ball.mesh.position.set(nx, ny, cur.z);
    CollisionManager.checkAgainst(ball);
  }
}

// ============================================================================
// Background Animation — ported from Components/BackgroundAnimViewModel.ts
// ============================================================================
const bgAnim = {
  overlayEl: document.getElementById('bgOverlay'),
  pulseColor: '#FFFFFF',
  currentIntensity: 0,
  decayPerTick: 0.01,
  idleTime: 0,
};
const BG_TICK_MS = 30;
const BG_MAX_OPACITY = 0.15;
const BG_DECAY_RATE = 0.01;
const BG_IDLE_THRESHOLD_S = 1.5;
const BG_IDLE_DECAY_RATE = 0.015;

function bgColorToHex(c) {
  const r = Math.round(Math.min(1, Math.max(0, c.r)) * 255);
  const g = Math.round(Math.min(1, Math.max(0, c.g)) * 255);
  const b = Math.round(Math.min(1, Math.max(0, c.b)) * 255);
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function bgPulse(intensity, durationSeconds, color) {
  if (color) bgAnim.pulseColor = color;
  bgAnim.idleTime = 0;
  if (intensity > bgAnim.currentIntensity) bgAnim.currentIntensity = intensity;
  const ticksInDuration = (durationSeconds * 1000) / BG_TICK_MS;
  if (ticksInDuration > 0) {
    bgAnim.decayPerTick = Math.max(BG_DECAY_RATE, intensity / ticksInDuration);
  }
}

setInterval(() => {
  const tickSec = BG_TICK_MS / 1000;
  bgAnim.idleTime += tickSec;
  if (bgAnim.currentIntensity > 0) {
    bgAnim.currentIntensity = Math.max(0, bgAnim.currentIntensity - bgAnim.decayPerTick);
  }
  if (bgAnim.idleTime >= BG_IDLE_THRESHOLD_S && bgAnim.currentIntensity > 0) {
    bgAnim.currentIntensity = Math.max(0, bgAnim.currentIntensity - BG_IDLE_DECAY_RATE);
  }
  bgAnim.overlayEl.style.backgroundColor = bgAnim.pulseColor;
  bgAnim.overlayEl.style.opacity = String(BG_MAX_OPACITY * bgAnim.currentIntensity);
}, BG_TICK_MS);

Events.on('BrickDestroyed', (p) => bgPulse(0.75, 0.3, bgColorToHex(p.color)));
Events.on('BallLost', () => bgPulse(0.7, 1.0));
Events.on('IncrementCombo', () => bgPulse(0.9, 0.4));

// ============================================================================
// Combo HUD — ported from Components/ComboHUDViewModel.ts
// ============================================================================
const COLOR_CYAN = '#00FFFF';
const COLOR_HOT_PINK = '#FF69B4';
const COLOR_MAGENTA = '#FF00FF';
const COLOR_GOLD = '#FFD700';
const LIGHTEN_AMT = 0.2;
const DARKEN_AMT = 0.1;

function blendHex(hex, amt) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const target = amt > 0 ? 255 : 0;
  const blend = c => Math.round(c + (target - c) * Math.abs(amt));
  const toHex = c => Math.min(255, Math.max(0, c)).toString(16).padStart(2, '0');
  return `#${toHex(blend(r))}${toHex(blend(g))}${toHex(blend(b))}`;
}

const POP_DURATION = 0.05;
const GROW_FADE_DURATION = 0.6;
const SCALE_BURST = 1.5;
const SCALE_MAX = 6.0;
const FADE_DURATION = 0.5;
const SHAKE_LIGHT = 2;
const SHAKE_HEAVY = 5;

const comboHud = {
  el: document.getElementById('comboOverlay'),
  wrap: document.getElementById('comboWrap'),
  label: document.getElementById('comboLabel'),
  main: document.getElementById('comboMain'),
  glow: document.getElementById('comboGlow'),
  count: 0,
  isFading: false,
  isAnimating: false,
  animTimer: 0,
  shakeTimer: 0,
  opacity: 0,
  scale: 0,
  shakeX: 0,
  shakeY: 0,
};

function comboGetColor(count) {
  if (count >= 15) return COLOR_GOLD;
  if (count >= 10) return COLOR_MAGENTA;
  if (count >= 5) return COLOR_HOT_PINK;
  return COLOR_CYAN;
}

function comboApplyColor(color) {
  const top = blendHex(color, LIGHTEN_AMT);
  const bot = blendHex(color, -DARKEN_AMT);
  comboHud.label.style.color = color;
  comboHud.main.style.background = `linear-gradient(to bottom, ${top} 0%, ${bot} 100%)`;
  comboHud.main.style.webkitBackgroundClip = 'text';
  comboHud.main.style.backgroundClip = 'text';
  comboHud.main.style.webkitTextFillColor = 'transparent';
  comboHud.main.style.color = 'transparent';
  comboHud.glow.style.background = `linear-gradient(to bottom, ${top} 0%, ${bot} 100%)`;
  comboHud.glow.style.webkitBackgroundClip = 'text';
  comboHud.glow.style.backgroundClip = 'text';
  comboHud.glow.style.webkitTextFillColor = 'transparent';
  comboHud.glow.style.color = 'transparent';
}

function comboRender() {
  comboHud.el.style.opacity = String(comboHud.opacity);
  comboHud.wrap.style.transform = `scale(${comboHud.scale}) translate(${comboHud.shakeX}px, ${comboHud.shakeY}px)`;
}

Events.on('IncrementCombo', () => {
  comboHud.count++;
  comboHud.isFading = false;
  if (comboHud.count < 2) return;
  const txt = `x${comboHud.count}`;
  comboHud.main.textContent = txt;
  comboHud.glow.textContent = txt;
  comboHud.scale = 0;
  comboHud.opacity = 1;
  comboHud.animTimer = 0;
  comboHud.isAnimating = true;
  const baseColor = comboGetColor(comboHud.count);
  comboApplyColor(baseColor);
  comboHud.glow.classList.toggle('show', comboHud.count >= 5);
  comboHud.shakeTimer = comboHud.count >= 10 ? 0.15 : 0;
  comboRender();
});

Events.on('ResetCombo', () => {
  if (comboHud.count === 0) return;
  comboHud.isFading = true;
  comboHud.isAnimating = true;
});

function comboTick(dt) {
  if (!comboHud.isAnimating) return;

  if (comboHud.isFading) {
    const next = comboHud.opacity - dt / FADE_DURATION;
    if (next <= 0) {
      comboHud.count = 0;
      comboHud.isFading = false;
      comboHud.isAnimating = false;
      comboHud.shakeTimer = 0;
      comboHud.opacity = 0;
      comboHud.scale = 1;
      comboHud.shakeX = 0;
      comboHud.shakeY = 0;
      comboApplyColor(COLOR_CYAN);
      comboHud.glow.classList.remove('show');
      comboRender();
      return;
    }
    comboHud.opacity = next;
    comboRender();
    return;
  }

  comboHud.animTimer += dt;
  if (comboHud.animTimer <= POP_DURATION) {
    const t = POP_DURATION > 0 ? Math.min(comboHud.animTimer / POP_DURATION, 1) : 1;
    comboHud.scale = t * SCALE_BURST;
    comboHud.opacity = 1;
  } else {
    const elapsed = comboHud.animTimer - POP_DURATION;
    const t = Math.min(elapsed / GROW_FADE_DURATION, 1);
    comboHud.scale = SCALE_BURST + (SCALE_MAX - SCALE_BURST) * t;
    const opacity = t < 0.15 ? 1.0 - (t / 0.15) * 0.82 : 0.18 * (1.0 - (t - 0.15) / 0.85);
    comboHud.opacity = Math.max(opacity, 0);
    if (t >= 1) {
      comboHud.opacity = 0;
      comboHud.isAnimating = false;
      comboHud.shakeTimer = 0;
      comboHud.shakeX = 0;
      comboHud.shakeY = 0;
    }
  }

  if (comboHud.shakeTimer > 0) {
    comboHud.shakeTimer -= dt;
    const intensity = comboHud.count >= 20 ? SHAKE_HEAVY : SHAKE_LIGHT;
    comboHud.shakeX = (Math.random() - 0.5) * 2 * intensity;
    comboHud.shakeY = (Math.random() - 0.5) * 2 * intensity;
  } else {
    comboHud.shakeX = 0;
    comboHud.shakeY = 0;
  }

  comboRender();
}

// ============================================================================
// Score HUD — ported from GameHUDViewModel.ts (reveal + roll-up + pulse)
// ============================================================================
const scoreHud = {
  bar: document.getElementById('scoreBar'),
  stack: document.getElementById('scoreStack'),
  main: document.getElementById('scoreMain'),
  shadow: document.getElementById('scoreShadow'),
  magenta: document.getElementById('scoreMagenta'),
  pink: document.getElementById('scorePink'),
  cyan: document.getElementById('scoreCyan'),
  displayScore: 0,
  targetScore: 0,
  scale: 0,
  opacity: 0,
  glowOpacity: 0,
  revealed: false,
  // Anim state
  animIntervalId: null,
  animTick: 0,
  settling: false,
  revealIntervalId: null,
  revealElapsed: 0,
};

const SCORE_ANIM_INTERVAL_MS = 30;
const SCORE_SCALE_PUNCH = 1.3;
const SCORE_GLOW_MAX = 0.8;
const SCORE_SETTLE_SPEED = 0.15;
const SCORE_REVEAL_INTERVAL_MS = 16;
const SCORE_REVEAL_DURATION_MS = 500;
const SCORE_REVEAL_OVERSHOOT = 1.15;
const SCORE_REVEAL_DAMPING = 5;
const SCORE_REVEAL_FREQUENCY = 2.5;

function scoreRender() {
  scoreHud.bar.style.opacity = String(scoreHud.opacity);
  scoreHud.bar.style.transform = `scale(${scoreHud.scale})`;
  scoreHud.stack.style.transform = `scale(${1 + (SCORE_SCALE_PUNCH - 1) * (scoreHud.glowOpacity / SCORE_GLOW_MAX)})`;
  const txt = String(Math.floor(scoreHud.displayScore));
  scoreHud.main.textContent = txt;
  scoreHud.shadow.textContent = txt;
  scoreHud.magenta.textContent = txt;
  scoreHud.pink.textContent = txt;
  scoreHud.cyan.textContent = txt;
  scoreHud.magenta.style.opacity = String(scoreHud.glowOpacity);
  scoreHud.pink.style.opacity = String(scoreHud.glowOpacity);
}

function startScoreAnim() {
  if (scoreHud.animIntervalId !== null) return;
  scoreHud.animTick = 0;
  scoreHud.settling = false;
  scoreHud.animIntervalId = setInterval(() => {
    if (scoreHud.settling) {
      let done = true;
      if (scoreHud.glowOpacity > 0) {
        scoreHud.glowOpacity = Math.max(0, scoreHud.glowOpacity - SCORE_SETTLE_SPEED);
        if (scoreHud.glowOpacity > 0) done = false;
      }
      if (done) {
        scoreHud.glowOpacity = 0;
        clearInterval(scoreHud.animIntervalId);
        scoreHud.animIntervalId = null;
        scoreHud.animTick = 0;
        scoreHud.settling = false;
      }
      scoreRender();
      return;
    }
    const remaining = scoreHud.targetScore - scoreHud.displayScore;
    if (remaining <= 0) {
      scoreHud.displayScore = scoreHud.targetScore;
      scoreHud.settling = true;
      scoreRender();
      return;
    }
    const step = Math.max(1, Math.ceil(remaining / 8));
    scoreHud.displayScore = Math.min(scoreHud.displayScore + step, scoreHud.targetScore);
    scoreHud.animTick++;
    const wave = Math.sin(scoreHud.animTick * 0.4);
    const waveNorm = (wave + 1) / 2;
    scoreHud.glowOpacity = SCORE_GLOW_MAX * waveNorm;
    scoreRender();
  }, SCORE_ANIM_INTERVAL_MS);
}

function revealScoreBar() {
  if (scoreHud.revealed) return;
  scoreHud.revealed = true;
  scoreHud.scale = 0;
  scoreHud.opacity = 0;
  scoreHud.revealElapsed = 0;
  scoreHud.revealIntervalId = setInterval(() => {
    scoreHud.revealElapsed += SCORE_REVEAL_INTERVAL_MS;
    const t = Math.min(scoreHud.revealElapsed / SCORE_REVEAL_DURATION_MS, 1);
    const spring = 1.0 - Math.cos(t * Math.PI * SCORE_REVEAL_FREQUENCY) * Math.exp(-t * SCORE_REVEAL_DAMPING);
    scoreHud.scale = spring * SCORE_REVEAL_OVERSHOOT * (1.0 - t) + spring * t;
    scoreHud.opacity = Math.min(1.0, t / 0.4);
    if (t >= 1) {
      scoreHud.scale = 1;
      scoreHud.opacity = 1;
      clearInterval(scoreHud.revealIntervalId);
      scoreHud.revealIntervalId = null;
    }
    scoreRender();
  }, SCORE_REVEAL_INTERVAL_MS);
}

function hideScoreBar() {
  scoreHud.revealed = false;
  scoreHud.scale = 0;
  scoreHud.opacity = 0;
  if (scoreHud.revealIntervalId !== null) {
    clearInterval(scoreHud.revealIntervalId);
    scoreHud.revealIntervalId = null;
  }
  if (scoreHud.animIntervalId !== null) {
    clearInterval(scoreHud.animIntervalId);
    scoreHud.animIntervalId = null;
  }
  scoreHud.displayScore = 0;
  scoreHud.targetScore = 0;
  scoreRender();
}

// ============================================================================
// Center Text — bounce + squash, ported from GameHUDViewModel._tickBounce
// ============================================================================
const centerHud = {
  container: document.getElementById('centerContainer'),
  wrap: document.getElementById('centerWrap'),
  layers: [
    document.getElementById('centerShadow'),
    document.getElementById('centerMagenta'),
    document.getElementById('centerPink'),
    document.getElementById('centerCyan'),
    document.getElementById('centerMain'),
  ],
  shown: false,
  translateX: 0,
  translateY: 0,
  scaleX: 1,
  scaleY: 1,
  rotation: 0,
  bounceDirX: 1,
  bounceDirY: 1,
  squashing: false,
  intervalId: null,
};

// Source constants (from GameHUDViewModel.ts), adapted for pixel space inside stage
const BOUNCE_INTERVAL_MS = 35;
const BOUNCE_SPEED = 1.4;   // scaled for our smaller stage (source uses 10 in 900x1600)
const BOUNCE_RANGE_X = 60;  // px around center (source: 250 in 900px-wide canvas)
const BOUNCE_RANGE_Y = 180; // px around center (source: 1300 in 1600px-tall canvas)
const SQUASH_SCALE_X = 1.1;
const SQUASH_SCALE_Y = 0.9;
const SQUASH_RECOVER_SPEED = 0.32;

function setCenterText(text) {
  for (const el of centerHud.layers) el.textContent = text;
}

function centerRender() {
  centerHud.container.style.transform =
    `translate(calc(-50% + ${centerHud.translateX}px), calc(-50% + ${centerHud.translateY}px))`;
  centerHud.wrap.style.transform = `scale(${centerHud.scaleX}, ${centerHud.scaleY})`;
}

function showCenterText(text) {
  setCenterText(text);
  centerHud.shown = true;
  centerHud.container.style.opacity = '1';
  centerHud.translateX = 0;
  centerHud.translateY = 0;
  centerHud.scaleX = 1;
  centerHud.scaleY = 1;
  centerHud.rotation = 0;
  centerHud.bounceDirX = Math.random() > 0.5 ? 1 : -1;
  centerHud.bounceDirY = Math.random() > 0.5 ? 1 : -1;
  centerHud.squashing = false;
  if (centerHud.intervalId === null) {
    centerHud.intervalId = setInterval(tickCenterBounce, BOUNCE_INTERVAL_MS);
  }
  centerRender();
}

function hideCenterText() {
  centerHud.shown = false;
  centerHud.container.style.opacity = '0';
  if (centerHud.intervalId !== null) {
    clearInterval(centerHud.intervalId);
    centerHud.intervalId = null;
  }
  centerHud.translateX = 0;
  centerHud.translateY = 0;
  centerHud.scaleX = 1;
  centerHud.scaleY = 1;
  centerRender();
}

function tickCenterBounce() {
  centerHud.translateX += BOUNCE_SPEED * centerHud.bounceDirX;
  centerHud.translateY += BOUNCE_SPEED * centerHud.bounceDirY;

  let hitEdge = false;
  if (centerHud.translateX >= BOUNCE_RANGE_X) {
    centerHud.translateX = BOUNCE_RANGE_X;
    centerHud.bounceDirX = -1;
    hitEdge = true;
  } else if (centerHud.translateX <= -BOUNCE_RANGE_X) {
    centerHud.translateX = -BOUNCE_RANGE_X;
    centerHud.bounceDirX = 1;
    hitEdge = true;
  }
  if (centerHud.translateY >= BOUNCE_RANGE_Y) {
    centerHud.translateY = BOUNCE_RANGE_Y;
    centerHud.bounceDirY = -1;
    hitEdge = true;
  } else if (centerHud.translateY <= -BOUNCE_RANGE_Y) {
    centerHud.translateY = -BOUNCE_RANGE_Y;
    centerHud.bounceDirY = 1;
    hitEdge = true;
  }

  if (hitEdge) {
    centerHud.squashing = true;
    centerHud.scaleX = SQUASH_SCALE_X;
    centerHud.scaleY = SQUASH_SCALE_Y;
  }

  if (centerHud.squashing) {
    const doneX = Math.abs(centerHud.scaleX - 1.0) < 0.01;
    const doneY = Math.abs(centerHud.scaleY - 1.0) < 0.01;
    if (!doneX) centerHud.scaleX += (1.0 - centerHud.scaleX) * SQUASH_RECOVER_SPEED;
    else centerHud.scaleX = 1.0;
    if (!doneY) centerHud.scaleY += (1.0 - centerHud.scaleY) * SQUASH_RECOVER_SPEED;
    else centerHud.scaleY = 1.0;
    if (doneX && doneY) centerHud.squashing = false;
  }

  centerRender();
}

// ============================================================================
// Game Manager — 1 life, no hearts
// ============================================================================
const game = {
  score: 0,
  currentLevel: 0,
  bricksDestroyedThisLevel: 0,
  destructibleCount: 0,
  showingTitle: true,
  waitingForCoins: false,
  transitionDelay: 0,
  showingGameOver: false,
  combo: 0,
};

const ui = {
  level: document.getElementById('level'),
};

function renderLevel() {
  ui.level.textContent = game.showingTitle
    ? 'BRICK IT DOWN'
    : `LEVEL ${game.currentLevel + 1} — ${LEVELS[game.currentLevel].name}`;
}

function applyLevelPalette(config) {
  const ballC = config.palette?.ball ?? DEFAULT_PALETTE.ball;
  const paddleC = config.palette?.paddle ?? DEFAULT_PALETTE.paddle;
  ball.baseColor.setRGB(ballC[0], ballC[1], ballC[2]);
  ball.mesh.material.color.copy(ball.baseColor);
  paddle.baseColor.setRGB(paddleC[0], paddleC[1], paddleC[2]);
  paddle.mesh.material.color.copy(paddle.baseColor);
}

function loadLevel(index) {
  game.currentLevel = index;
  game.showingTitle = false;
  game.bricksDestroyedThisLevel = 0;
  game.combo = 0;
  BallPower.resetHeat();
  const config = LEVELS[index];
  applyLevelPalette(config);
  game.destructibleCount = layoutLevel(config);
  ball.revealing = REVEAL_DURATION;
  ball.reset();
  paddle.reset();
  renderLevel();
  revealScoreBar();
  showCenterText('TAP TO START');
}

function loadTitle() {
  game.showingTitle = true;
  game.combo = 0;
  BallPower.resetHeat();
  layoutLevel(TITLE_CONFIG);
  applyLevelPalette({ palette: DEFAULT_PALETTE });
  ball.mesh.position.set(0, -100, 0);
  ball.locked = true;
  ball.isIdle = true;
  renderLevel();
  hideScoreBar();
  showCenterText('TAP TO START');
}

Events.on('CoinCollected', (p) => {
  game.score += p.value;
  scoreHud.targetScore = game.score;
  startScoreAnim();
});

Events.on('BrickDestroyed', () => {
  game.bricksDestroyedThisLevel++;
  game.combo++;
  BallPower.incrementHeat();
  Events.emit('IncrementCombo');
  if (game.bricksDestroyedThisLevel >= game.destructibleCount && !game.showingTitle) {
    game.waitingForCoins = true;
    game.transitionDelay = 0;
    superVacuum = true;
    Events.emit('LevelCleared');
    showCenterText('CLEARED');
  }
});

Events.on('BrickHit', () => {
  triggerShake(SHAKE_BRICK_HIT.intensity, SHAKE_BRICK_HIT.duration);
  triggerFreeze(FREEZE_BRICK_HIT);
});

Events.on('PaddleHit', (p) => {
  if (p.ballVelocityY === 0) return;
  if (game.combo > 0) {
    game.combo = 0;
    Events.emit('ResetCombo');
  }
  Events.emit('PaddleHitCoin');
});

// 1-life: any ball lost → immediate game over
Events.on('BallLost', () => {
  if (game.showingGameOver || game.waitingForCoins || game.showingTitle) return;
  if (game.combo > 0) { game.combo = 0; Events.emit('ResetCombo'); }
  BallPower.resetHeat();
  triggerShake(SHAKE_BALL_LOST.intensity, SHAKE_BALL_LOST.duration);
  triggerFreeze(FREEZE_BALL_LOST);
  game.showingGameOver = true;
  Events.emit('LevelCleared');
  showCenterText('GAME OVER');
});

Events.on('ReleaseBall', () => hideCenterText());

function finishLevelTransition() {
  game.waitingForCoins = false;
  superVacuum = false;
  const next = (game.currentLevel + 1) % LEVELS.length;
  loadLevel(next);
  Events.emit('ResetRound');
}

function restartGame() {
  game.showingGameOver = false;
  game.score = 0;
  game.combo = 0;
  BallPower.resetHeat();
  ball.clearedLevels = 0;
  hideScoreBar();
  loadLevel(0);
  Events.emit('ResetRound');
}

// ============================================================================
// Input — mouse + touch (stage-relative)
// ============================================================================
let pointerDown = false;

function pointerToWorld(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const nx = ((clientX - rect.left) / rect.width) * 2 - 1;
  const ny = -((clientY - rect.top) / rect.height) * 2 + 1;
  const viewW = camera.right - camera.left;
  const viewH = camera.top - camera.bottom;
  return { x: nx * viewW / 2, y: ny * viewH / 2 };
}

function onPointerDown(clientX, clientY) {
  pointerDown = true;
  if (game.showingTitle) {
    hideCenterText();
    loadLevel(0);
    return;
  }
  if (game.showingGameOver) {
    restartGame();
    return;
  }
  const w = pointerToWorld(clientX, clientY);
  paddle.targetX = w.x;
  if (ball.isIdle && !ball.locked) ball.launch();
}

function onPointerMove(clientX, clientY) {
  if (!pointerDown) return;
  const w = pointerToWorld(clientX, clientY);
  paddle.targetX = w.x;
}

canvas.addEventListener('mousedown', (e) => { e.preventDefault(); onPointerDown(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', (e) => onPointerMove(e.clientX, e.clientY));
window.addEventListener('mouseup', () => { pointerDown = false; });
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  onPointerDown(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  onPointerMove(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('touchend', () => { pointerDown = false; });

const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Enter') {
    if (game.showingTitle) { hideCenterText(); loadLevel(0); }
    else if (game.showingGameOver) restartGame();
    else if (ball.isIdle && !ball.locked) ball.launch();
  }
});
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

// ============================================================================
// Main Loop
// ============================================================================
let lastTime = performance.now();
function frame() {
  requestAnimationFrame(frame);
  const now = performance.now();
  let dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  const isFrozen = (now / 1000) < freeze.until;
  const effDt = isFrozen ? 0 : dt;

  const kbSpeed = 10 * effDt;
  if (keys['ArrowLeft'] || keys['a']) paddle.targetX -= kbSpeed;
  if (keys['ArrowRight'] || keys['d']) paddle.targetX += kbSpeed;

  if (!game.showingTitle) {
    updatePaddle(effDt);
    updateBall(effDt);
  }
  for (const b of activeBricks) b.update(effDt);
  for (let i = activeBricks.length - 1; i >= 0; i--) {
    if (!activeBricks[i].active) {
      brickPool.push(activeBricks[i]);
      activeBricks.splice(i, 1);
    }
  }
  if (!game.showingTitle) updateCoins(effDt);
  for (const p of particlePool) p.update(effDt);
  for (const t of trailPool) t.update(effDt);

  comboTick(dt);

  if (game.waitingForCoins && !game.showingTitle) {
    if (coins.length === 0) {
      game.transitionDelay += effDt;
      if (game.transitionDelay >= 1.0) finishLevelTransition();
    }
  }

  if (cameraShake.duration > 0) {
    cameraShake.elapsed += effDt;
    const t = cameraShake.elapsed / cameraShake.duration;
    if (t >= 1) {
      cameraShake.duration = 0;
      cameraShake.intensity = 0;
      camera.position.x = 0;
      camera.position.y = 0;
    } else {
      const falloff = 1 - t;
      camera.position.x = (Math.random() - 0.5) * cameraShake.intensity * falloff * 2;
      camera.position.y = (Math.random() - 0.5) * cameraShake.intensity * falloff * 2;
    }
  }

  renderer.render(scene, camera);
}
frame();

// ── Boot ───────────────────────────────────────────────────────────────
applyLevelPalette({ palette: DEFAULT_PALETTE });
renderLevel();
scoreRender();
loadTitle();

</script>
</body>
