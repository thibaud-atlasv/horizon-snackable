tasks:
  - name: Tower Shop UI
    status: done
    summary: Scrollable horizontal shop bar with dynamic tower buttons, 3 visual states, ViewModel bindings
    files:
      - Scripts/Components/TowerShopHud.ts
      - UI/TowerShop.xaml
      - player.hstf

  - name: Modular Tower Kit
    status: in_progress
    subtasks:
      - name: Generate tower bases (3 variants)
        status: in_progress
      - name: Generate tower bodies (4 variants)
        status: not_started
      - name: Generate tower tops (5 variants)
        status: not_started

  - name: Arrow Tower Mesh
    status: done
    summary: Generated complete Arrow Tower 3D mesh with green color scheme, hexagonal design
    files:
      - Models/Towers/ArrowTower_remeshed.glb
      - Models/Towers/ArrowTower_remeshed.fbx
      - Models/Towers/ArrowTower.material
      - Models/Towers/ArrowTower.png

  - name: Enlarge Tower Shop UI
    status: done
    summary: Doubled shop bar height to 200px (~20% screen), enlarged buttons to 120x120px, scaled fonts and icons
    files:
      - UI/TowerShop.xaml

  - name: Triple Tower Shop Size
    status: done
    summary: Tripled all shop dimensions - 600px height, 360x360px buttons, 54px/48px fonts, 72px icons
    files:
      - UI/TowerShop.xaml

  - name: Cannon Tower Mesh
    status: done
    summary: Generated Cannon Tower mesh with dual cannons, orange color scheme, hexagonal fortress design
    files:
      - Models/Towers/CannonTower/CannonTower_remeshed.glb
      - Models/Towers/CannonTower/CannonTower_remeshed.fbx

  - name: Frost Tower Mesh
    status: done
    summary: Generated optimized Frost Tower mesh (~1,250 triangles, 512x512 texture, cyan ice crystals)
    files:
      - Models/Towers/FrostTower/FrostTower_remeshed.glb
      - Models/Towers/FrostTower/FrostTower_remeshed.fbx

  - name: Laser Tower Mesh
    status: done
    summary: Generated optimized Laser Tower mesh (~1,500 triangles, 512x512 texture, purple sci-fi spire design)
    files:
      - Models/Towers/LaserTower/LaserTower_remeshed.glb
      - Models/Towers/LaserTower/LaserTower_remeshed.fbx

  - name: Integrate Tower Meshes
    status: done
    summary: Created 4 tower templates with meshes, updated Assets.ts and TowerDefs.ts, verified system compatibility
    files:
      - Templates/Towers/ArrowTower.hstf
      - Templates/Towers/CannonTower.hstf
      - Templates/Towers/FrostTower.hstf
      - Templates/Towers/LaserTower.hstf
      - Scripts/Assets.ts

  - name: Game HUD
    status: done
    summary: Created top banner HUD with lives, gold, wave display. GameHudController subscribes to events for live updates.
    files:
      - UI/GameHud.xaml
      - Scripts/Components/GameHudController.ts
      - player.hstf

  - name: Move UI to Scene
    status: done
    summary: Moved TowerShopUI and GameHud from player.hstf to space.hstf for scene-level UI hosting
    files:
      - space.hstf
      - player.hstf

  - name: Enlarge Game HUD
    status: done
