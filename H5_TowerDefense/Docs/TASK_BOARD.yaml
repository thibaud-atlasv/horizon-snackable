  - name: Add Wave to HUD Center
    status: done
    summary: Added wave number in center on 2 lines (WAVE label + number), 3-column layout
    files:
      - UI/GameHud.xaml

  - name: Wave Format X/10
    status: done
    summary: Changed wave display from just number to "X/10" format (e.g., 1/10, 2/10)
