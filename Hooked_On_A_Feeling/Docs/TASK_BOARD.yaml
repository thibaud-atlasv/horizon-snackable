notes:
  - Project initialized with comprehensive design documentation
  - All systems reference VN_SYSTEMS_BIBLE_v2.0.md by SYS-NN-NAME
  - Build order follows 7 milestones defined in PROJECT_SUMMARY.md
  - Art direction established for nocturnal pond illustration style
  - Milestone 1 complete — foundation systems working, Nereia Tier 1 playable
  - Milestone 2 complete — affection system working, tier progression functional, Nereia Tier 2 playable
  - Game renamed from "FLOATER" to "Hooked on a Feeling"
  - Fishing cast mechanics added: LakeIdle → CastCharging (power gauge) → CastFlying (arc physics) → FloatLanded (splash VFX) → Approach
  - Cast loop: Title → LakeIdle → CastCharging → CastFlying → FloatLanded → Approach → Exchange → Departure → Idle
  - Power gauge: vertical bar, ping-pong indicator, tap to lock power
  - Float physics: parabolic arc trajectory, 1.2s flight, power-based height
  - Splash VFX: 3 staggered ripple circles, 0.5s pause before character appears
  - DRIFT system tracks departure state for next Cast and applies affection modifiers
  - Affection system: hidden meter (0-100), TIER_ONLY visibility, floor mechanic, ±30 cap per action
  - Tier progression: 5 tiers with thresholds at 0, 15, 35, 60, 85
  - Mood icons implemented as sprites (no Unicode) - 5 icons for 5 tiers
  - All dialogue follows pacing rules (≤80 chars, 1 line per bubble)
  - Layout: Central portrait (170px, DrawingSurface), dialogue panel (XAML Custom UI, editable in editor), action menu (XAML)
  - Background uses UniformToFill stretch to fill 100% height and crop left/right as needed
  - Design documents (FLOATER_GDD_v1.0.md, FLOATER_VISUAL_BIBLE_v1.0.md, VN_SYSTEMS_BIBLE_v2.0.md) kept with original names as reference
  - Character system restructured: modular CharacterRegistry allows easy addition of new fish
  - Only Nereia implemented currently - other fish removed from docs
  - To add new character: create CharacterData_NewFish.ts, register in CharacterRegistry.ts
  - All Nereia content consolidated in CharacterData_Nereia.ts (metadata, portraits, lures, quest hints, dialogues, endings)
  - Quest system: 5 quest types (use_lure, talk_to_fish, talk_to_x_fish, make_fish_leave, custom)
  - Lake zones: Near (0-33%), Mid (34-66%), Far (67-100%) based on cast power
  - Encounter priority: quest incomplete = never appears, quest complete = prioritized, lure preference = 2x weight
  - Multi-character support ready: per-fish cast indices, quest tracking, zone-based spawning
